{% extends "base.html" %}

{% block content %}

<style>

.dashboard-container{
    width:90%;
    margin:auto;
    margin-top:40px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.create-btn{
    background:#4CAF50;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    text-decoration:none;
}

.resume-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-top:30px;
}

.resume-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.resume-card h3{
    margin-bottom:10px;
}

.card-btn{
    margin-top:10px;
    display:inline-block;
    padding:8px 14px;
    background:#007BFF;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.download-btn{
    background:#28a745;
}

.delete-btn{
    background:#dc3545;
}

</style>


<div class="dashboard-container">

<div class="top-bar">

<h2>Your Resumes</h2>

<a href="/education" class="create-btn">+ Create Resume</a>

</div>


<div class="resume-grid">

{% for resume in resumes %}

<div class="resume-card">

<h3>{{ resume.name }}</h3>

<p><b>Email:</b> {{ resume.email }}</p>
<p><b>Phone:</b> {{ resume.phone }}</p>
<p><b>Skills:</b> {{ resume.skills }}</p>

<a href="/download/{{resume.id}}" class="card-btn download-btn">
Download
</a>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
